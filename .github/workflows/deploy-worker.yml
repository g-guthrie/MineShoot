name: Deploy Legacy Worker (manual)

# Legacy MineShoot worker deploy. The active stack (zombies-game +
# hytopia-client) is covered by ci.yml; this deploy is manual-only so
# pushes to main no longer auto-deploy the legacy game.
on:
  workflow_dispatch:

concurrency:
  group: deploy-worker-main
  cancel-in-progress: true

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy Cloudflare Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy -c wrangler.worker.toml
