name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  pvp-server:
    name: highchair-game typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: highchair-game
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: highchair-game/package-lock.json
      - run: npm ci
      # No asset build here: the SDK's model/atlas pipeline needs
      # KTX-Software (ktx/toktx) which runners don't have installed.
      - run: npm run typecheck

  pvp-client:
    name: highchair-client build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: highchair-client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: highchair-client/package-lock.json
      - run: npm ci
      - run: npm run build
