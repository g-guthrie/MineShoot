name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  server-typecheck:
    name: zombies-game typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: zombies-game
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: zombies-game/package-lock.json
      - run: npm ci
      - run: npm run typecheck

  client-build:
    name: hytopia-client typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: hytopia-client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: hytopia-client/package-lock.json
      - run: npm ci
      - run: npm run build
