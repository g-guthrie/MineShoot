SESSION_DAYS = "30"
ROOM_NAME = "global"
BOT_COUNT = "6"
AUTH_THROTTLE_WINDOW_SEC = "300"
AUTH_THROTTLE_MAX_FAILS = "5"
AUTH_THROTTLE_BLOCK_SEC = "900"

[[env.production.durable_objects.bindings]]
name = "GLOBAL_ARENA"
class_name = "GlobalArenaRoom"

[[env.production.d1_databases]]
binding = "DB"
database_name = "minecraft-fps-db-prod"
