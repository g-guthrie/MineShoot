<!-- UI Scripts-->
<script>
  const CDN_ASSETS_URL = '{{CDN_ASSETS_URL}}';
  let ranks = [];
  let lastExp = 0;
  let lastRank;
  let leaderboardKillCounts = {};
  let gameEndTime = 0;
  let timerInterval;
  let isLoadExpUpdate = true; // Flag to track the first EXP update
  let localPlayerUsername = '';
  const summaryTopNameEl = document.querySelector('.summary-top-name');
  const summaryTopKillsEl = document.querySelector('.summary-top-kills');
  const summarySecondNameEl = document.querySelector('.summary-second-name');
  const summarySecondKillsEl = document.querySelector('.summary-second-kills');
  const summarySelfNameEl = document.querySelector('.summary-self-name');
  const summarySelfKillsEl = document.querySelector('.summary-self-kills');

  // Canonical aim anchoring: the server sends the active gun's true angular
  // offset (camera-space tangents measured from the model skeleton by
  // tools/measure-aim-offsets.mjs). The reticle position is re-projected
  // through the live camera every frame, so window size, aspect and scope
  // zoom can never drift the reticle away from where bullets actually go.
  let aimTangentX = 0, aimTangentY = 0;

  function positionReticles() {
    const cam = globalThis.__camera?.();
    if (cam?.projectionMatrix) {
      const e = cam.projectionMatrix.elements;
      const xPx = aimTangentX * e[0] * 0.5 * window.innerWidth;
      const yPx = -aimTangentY * e[5] * 0.5 * window.innerHeight;
      document.documentElement.style.setProperty('--reticle-screen-x-offset', xPx.toFixed(1) + 'px');
      document.documentElement.style.setProperty('--reticle-screen-y-offset', yPx.toFixed(1) + 'px');
    }
    requestAnimationFrame(positionReticles);
  }
  requestAnimationFrame(positionReticles);

  const isMobileClient = Boolean(highchair?.isMobile);
  highchair.sendData({
    type: 'client-platform',
    isMobile: isMobileClient,
  });

  // ---- loadout menu ----
  let loadoutCatalog = [];
  let loadoutSelected = [];
  let loadoutMaxSlots = 5;
  const loadoutPanel = document.querySelector('.loadout-panel');
  const loadoutGrid = document.querySelector('.loadout-grid');

  highchair.sendData({ type: 'request-loadout' });

  function renderLoadoutGrid() {
    document.querySelector('.loadout-max').textContent = loadoutMaxSlots;
    loadoutGrid.innerHTML = '';
    for (const gun of loadoutCatalog) {
      const card = document.createElement('div');
      const slotIndex = loadoutSelected.indexOf(gun.id);
      card.className = 'loadout-gun' + (slotIndex !== -1 ? ' selected' : '');
      card.innerHTML = `
        <img src="{{CDN_ASSETS_URL}}/${gun.icon}" alt="${gun.label}">
        <div class="gun-name">${gun.label}</div>
        <div class="gun-slot">${slotIndex !== -1 ? 'SLOT ' + (slotIndex + 1) : ''}</div>
      `;
      card.addEventListener('click', () => {
        const at = loadoutSelected.indexOf(gun.id);
        if (at !== -1) {
          loadoutSelected.splice(at, 1);
        } else if (loadoutSelected.length < loadoutMaxSlots) {
          loadoutSelected.push(gun.id);
        }
        renderLoadoutGrid();
      });
      loadoutGrid.appendChild(card);
    }
  }

  function openMenu() {
    if (loadoutPanel.classList.contains('open')) return;
    loadoutPanel.classList.add('open');
    if (!loadoutCatalog.length) highchair.sendData({ type: 'request-loadout' });
    // Freeze pointer lock so clicking menu buttons doesn't re-lock the
    // camera and slam the menu shut mid-click.
    highchair.freezePointerLock(true);
  }

  function closeMenu() {
    if (!loadoutPanel.classList.contains('open')) return;
    loadoutPanel.classList.remove('open');
    highchair.freezePointerLock(false);
    highchair.lockPointer(true);
  }

  // Esc exits pointer lock (browser-reserved); treat that as "open the menu".
  // Re-locking (clicking back into the game) closes it.
  document.addEventListener('pointerlockchange', () => {
    if (document.pointerLockElement) {
      loadoutPanel.classList.remove('open');
    } else {
      openMenu();
    }
  });

  document.querySelector('.loadout-toggle').addEventListener('click', () => {
    loadoutPanel.classList.contains('open') ? closeMenu() : openMenu();
  });
  document.querySelector('.loadout-cancel').addEventListener('click', closeMenu);
  document.querySelector('.loadout-apply').addEventListener('click', () => {
    if (loadoutSelected.length) {
      highchair.sendData({ type: 'set-loadout', guns: loadoutSelected });
    }
    closeMenu();
  });

  function updateLeaderboard() {
    const leaderboardPlayers = document.querySelector('.leaderboard-players');
    leaderboardPlayers.innerHTML = '';

    // Check if game has started
    if (gameEndTime === 0) {
      // Show "Waiting for players..." message if game hasn't started
      const waitingElement = document.createElement('div');
      waitingElement.className = 'leaderboard-player no-kills';
      waitingElement.innerHTML = `
        <div class="player-name">Waiting for players...</div>
        <div class="player-kills"></div>
      `;
      leaderboardPlayers.appendChild(waitingElement);
      return;
    }

    // Get sorted players by kill count
    const sortedPlayers = Object.entries(leaderboardKillCounts)
      .sort((a, b) => b[1] - a[1]);

    if (sortedPlayers.length === 0 || sortedPlayers.every(player => player[1] === 0)) {
      // Show "No kills yet" message if no players have kills
      const noKillsElement = document.createElement('div');
      noKillsElement.className = 'leaderboard-player no-kills';
      noKillsElement.innerHTML = `
        <div class="player-name">No kills yet</div>
        <div class="player-kills"></div>
      `;
      leaderboardPlayers.appendChild(noKillsElement);
      return;
    }

    // Create player elements for the leaderboard
    sortedPlayers.forEach((player, index) => {
      const [username, killCount] = player;

      // Skip players with 0 kills
      if (killCount === 0) return;

      const playerElement = document.createElement('div');
      playerElement.className = 'leaderboard-player';

      let rankIcon = '';
      if (index === 0) {
        rankIcon = `<img src="${CDN_ASSETS_URL}/icons/crown-gold.png" class="rank-icon">`;
      } else if (index === 1) {
        rankIcon = `<img src="${CDN_ASSETS_URL}/icons/crown-silver.png" class="rank-icon">`;
      } else if (index === 2) {
        rankIcon = `<img src="${CDN_ASSETS_URL}/icons/crown-bronze.png" class="rank-icon">`;
      }

      playerElement.innerHTML = `
        <div class="player-name">
          ${rankIcon}
          ${username}
        </div>
        <div class="player-kills">${killCount}</div>
      `;

      leaderboardPlayers.appendChild(playerElement);
    });

    updateLeaderboardSummary();
  }

  function updateLeaderboardSummary() {
    if (
      !document.body.classList.contains('mobile') ||
      !summaryTopNameEl ||
      !summaryTopKillsEl ||
      !summarySecondNameEl ||
      !summarySecondKillsEl ||
      !summarySelfNameEl ||
      !summarySelfKillsEl
    ) {
      return;
    }

    const entries = Object.entries(leaderboardKillCounts).sort((a, b) => b[1] - a[1]);
    const [topName = '—', topKills = 0] = entries[0] ?? [];
    const [secondName = '—', secondKills = 0] = entries[1] ?? [];
    const yourName = localPlayerUsername || 'You';
    const yourKills = localPlayerUsername ? (leaderboardKillCounts[localPlayerUsername] ?? 0) : 0;

    summaryTopNameEl.textContent = topName || '—';
    summaryTopKillsEl.textContent = `${topKills || 0} Kills`;
    summarySecondNameEl.textContent = secondName || '—';
    summarySecondKillsEl.textContent = `${secondKills || 0} Kills`;
    summarySelfNameEl.textContent = yourName;
    summarySelfKillsEl.textContent = `${yourKills || 0} Kills`;
  }

  function updateTimer() {
    const now = Date.now();
    const timeRemaining = Math.max(0, gameEndTime - now);

    // Format time as mm:ss
    const minutes = Math.floor(timeRemaining / 60000);
    const seconds = Math.floor((timeRemaining % 60000) / 1000);
    const formattedTime = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

    const timerValue = document.querySelector('.leaderboard-timer-value');
    if (timerValue) {
      timerValue.textContent = formattedTime;
    }

    // Stop the timer when it reaches zero
    if (timeRemaining <= 0) {
      clearInterval(timerInterval);
    }
  }

  function showGameStartAnnouncement() {
    const announcement = document.querySelector('.game-start-announcement');
    announcement.classList.add('active');

    // Remove the active class after animation completes
    setTimeout(() => {
      announcement.classList.remove('active');
    }, 3000);
  }

  function showWinnerAnnouncement(username) {
    const announcement = document.querySelector('.winner-announcement');
    announcement.textContent = `${username} wins!`;
    announcement.classList.add('active');

    // Remove the active class after animation completes
    setTimeout(() => {
      announcement.classList.remove('active');
    }, 5000);
  }

  function showRankUpAnnouncement(rank) {
    const announcement = document.querySelector('.rank-up-announcement');
    const rankIcon = announcement.querySelector('.rank-up-icon');
    const rankName = announcement.querySelector('.rank-up-name');

    rankIcon.src = `${CDN_ASSETS_URL}/${rank.iconUri}`;
    rankName.textContent = rank.name;

    announcement.classList.add('active');

    // Remove the active class after animation completes (e.g., 5 seconds)
    setTimeout(() => {
      announcement.classList.remove('active');
    }, 5000);
  }

  function showExpGainIndicator(amount) {
    const expBar = document.querySelector('.exp-bar');
    if (!expBar) return;

    const indicator = document.createElement('div');
    indicator.className = 'exp-gain-indicator';
    indicator.textContent = `+${amount} Exp`;

    expBar.appendChild(indicator);

    // Remove after animation completes
    setTimeout(() => {
      indicator.remove();
    }, 1500); // Match animation duration
  }

  // ---- reticle (old MineShoot bloom system) ----
  let reticleSpread = 0, reticlePellets = 1;

  function updateReticleSize() {
    const cross = document.getElementById('crosshair');
    const bloom = document.getElementById('spread-reticle');
    const ring = document.getElementById('shotgun-reticle');
    if (!cross || !bloom || !ring) return;
    const shotgun = reticlePellets >= 6;
    // radius px = spread x (viewport height / 2) -> diameter = spread x height
    const bloomPx = Math.round(reticleSpread * window.innerHeight);
    cross.style.display = shotgun ? 'none' : 'block';
    ring.style.display = shotgun ? 'block' : 'none';
    bloom.style.display = !shotgun && bloomPx > 3 ? 'block' : 'none';
    if (shotgun) {
      ring.style.width = ring.style.height = bloomPx + 'px';
    } else {
      bloom.style.width = bloom.style.height = bloomPx + 'px';
    }
  }
  window.addEventListener('resize', updateReticleSize);

  function setReticleTarget(active) {
    for (const id of ['crosshair', 'spread-reticle', 'shotgun-reticle']) {
      document.getElementById(id)?.classList.toggle('reticle-target-in-range', Boolean(active));
    }
  }

  let hitmarkerTimer;
  let hitmarkerHeadshotUntil = 0;

  function showHitmarker(headshot) {
    const hitmarker = document.querySelector('.hitmarker');
    if (!hitmarker) return;

    const now = Date.now();
    if (headshot) {
      hitmarkerHeadshotUntil = now + 160;
    } else if (now < hitmarkerHeadshotUntil) {
      headshot = true;
    }

    hitmarker.classList.remove('active', 'headshot');
    hitmarker.offsetHeight;
    if (headshot) hitmarker.classList.add('headshot');
    hitmarker.classList.add('active');

    clearTimeout(hitmarkerTimer);
    hitmarkerTimer = setTimeout(() => {
      hitmarker.classList.remove('active', 'headshot');
    }, 130);
  }

  function showDamageNumber(data) {
    const container = document.querySelector('.hit-damage-container');
    if (!container) return;

    const damage = Math.max(0, Number(data.damage) || 0);
    const pelletCount = Math.max(1, Number(data.pelletCount) || 1);
    const pelletIndex = Math.max(0, Number(data.pelletIndex) || 0);
    const headshot = Boolean(data.headshot);
    const isPelletCloud = pelletCount > 1;
    const angle = isPelletCloud
      ? (pelletIndex / pelletCount) * Math.PI * 2 + (Math.random() - 0.5) * 0.45
      : Math.random() * Math.PI * 2;
    const radius = isPelletCloud
      ? 34 + Math.random() * 78
      : 12 + Math.random() * 58;
    const startX = Math.cos(angle) * radius;
    const startY = Math.sin(angle) * radius * 0.62 - (isPelletCloud ? 8 : 20);
    const driftX = startX + (Math.random() - 0.5) * (isPelletCloud ? 34 : 60);
    const driftY = startY - (52 + Math.random() * 36);

    const damageNumber = document.createElement('div');
    damageNumber.className = `hit-damage-number${headshot ? ' headshot' : ''}${isPelletCloud ? ' pellet' : ''}`;
    damageNumber.textContent = damage;
    damageNumber.style.setProperty('--start-x', `${startX.toFixed(1)}px`);
    damageNumber.style.setProperty('--start-y', `${startY.toFixed(1)}px`);
    damageNumber.style.setProperty('--drift-x', `${driftX.toFixed(1)}px`);
    damageNumber.style.setProperty('--drift-y', `${driftY.toFixed(1)}px`);

    container.appendChild(damageNumber);

    setTimeout(() => {
      damageNumber.remove();
    }, 760);
  }

  highchair.registerSceneUITemplate('item-label', (id, onState) => {
    const template = document.getElementById('item-label-template');
    const clone = template.content.cloneNode(true);
    const labelName = clone.querySelector('.label-name');
    const labelQuantity = clone.querySelector('.label-quantity');
    const labelPrompt = clone.querySelector('.label-prompt');

    // Set prompt text based on platform
    const isMobile = document.body.classList.contains('mobile');
    labelPrompt.textContent = isMobile ? 'Tap to Pickup' : 'Click to Pickup';

    onState(state => {
      if (state.name) {
        labelName.textContent = state.name;
      }

      if (state.quantity !== undefined) {
        labelQuantity.textContent = state.quantity !== -1 ? state.quantity : '∞';
      }
    });

    return clone;
  });

  highchair.registerSceneUITemplate('player-rank', (id, onState) => {
    const template = document.getElementById('player-rank-template');
    const clone = template.content.cloneNode(true);
    const playerRankIcon = clone.querySelector('.player-rank-icon');

    onState(state => {
      if (state.iconUri) {
        playerRankIcon.src = `${CDN_ASSETS_URL}/${state.iconUri}`;
      }
    });

    return clone;
  });

  highchair.onData(data => {
    const { type } = data;

    if (!type) {
      return console.warn('No type received for data', data);
    }

    if (type === 'game-start') {
      showGameStartAnnouncement();
    }

    if (type === 'loadout') {
      loadoutCatalog = data.catalog || [];
      loadoutSelected = (data.selected || []).slice();
      loadoutMaxSlots = data.maxSlots || 5;
      renderLoadoutGrid();
    }

    if (type === 'announce-winner') {
      const { username } = data;
      showWinnerAnnouncement(username);
    }

    if (type === 'ammo-indicator') {
      const { ammo, totalAmmo, show, reloading } = data;

      if (show !== undefined) {
        const ammoIndicator = document.querySelector('.ammo-indicator');
        ammoIndicator.style.display = show ? 'block' : 'none';
      }

      if (reloading !== undefined) {
        const currentAmmo = document.querySelector('.current-ammo');
        currentAmmo.textContent = reloading ? '...' : ammo;
      }

      if (ammo !== undefined) {
        const currentAmmo = document.querySelector('.current-ammo');
        currentAmmo.textContent = ammo;
      }

      if (totalAmmo !== undefined) {
        const totalAmmoElement = document.querySelector('.total-ammo');
        totalAmmoElement.textContent = totalAmmo;
      }
    }

    if (type === 'damage-indicator') {
      const { direction } = data;

      // Make sure we have a valid direction object
      if (!direction || typeof direction.x === 'undefined' || typeof direction.z === 'undefined') {
        console.error('Invalid direction object:', direction);
        return;
      }

      // Hide all indicators first
      document.querySelectorAll('.damage-indicator').forEach(el => {
        el.classList.remove('active');
      });

      // Determine which indicator to show based on the dominant direction
      const absX = Math.abs(direction.x);
      const absZ = Math.abs(direction.z);

      let indicatorClass;
      if (absX > absZ) {
        indicatorClass = direction.x > 0 ? '.damage-indicator.right' : '.damage-indicator.left';
      } else {
        indicatorClass = direction.z > 0 ? '.damage-indicator.top' : '.damage-indicator.bottom';
      }

      // Show and animate the indicator
      const indicator = document.querySelector(indicatorClass);
      if (indicator) {
        indicator.classList.add('active');
        indicator.style.animation = 'none';
        indicator.offsetHeight; // Force reflow
        indicator.style.animation = 'fadeOut 1s forwards';
      }
    }

    if (type === 'exp-update') {
      const { totalExp, rankIndex } = data;
      const currentRank = ranks[rankIndex];
      const nextRank = ranks[rankIndex + 1];
      let gainedExp = 0;

      // Calculate gained exp only after the first update, which is for loading existing exp
      if (!isLoadExpUpdate) {
        gainedExp = totalExp - lastExp;
      } else {
        isLoadExpUpdate = false; // Mark load update as done
      }

      if (lastRank && lastRank.name !== currentRank.name && totalExp > 0) {
        showRankUpAnnouncement(currentRank);
      }

      // Show the gained exp number if positive
      if (gainedExp > 0) {
        showExpGainIndicator(gainedExp);
      }

      const expBarFill = document.querySelector('.exp-bar-fill');
      const expBarText = document.querySelector('.exp-text');
      const expRankIcon = document.querySelector('.exp-icon');

      expBarFill.style.width = `${((totalExp - currentRank.totalExp) / (nextRank.totalExp - currentRank.totalExp)) * 100}%`;
      expBarText.textContent = currentRank.name;
      expRankIcon.src = `${CDN_ASSETS_URL}/${currentRank.iconUri}`;

      lastExp = totalExp;
      lastRank = currentRank;
    }

    if (type === 'tracer') {
      globalThis.__tracers?.spawn(data);
    }

    if (type === 'reticle') {
      reticleSpread = Number(data.spread) || 0;
      reticlePellets = Number(data.pellets) || 1;
      aimTangentX = Number(data.tx) || 0;
      aimTangentY = Number(data.ty) || 0;
      updateReticleSize();
    }

    if (type === 'reticle-target') {
      setReticleTarget(data.active);
    }

    if (type === 'show-damage') {
      showHitmarker(Boolean(data.headshot));
      showDamageNumber(data);
    }

    if (type === 'health') {
      const { health, maxHealth } = data;
      const healthText = document.querySelector('.health-text');
      const healthBarFill = document.querySelector('.health-bar-fill');

      healthText.textContent = health;
      healthBarFill.style.width = `${(health / maxHealth) * 100}%`;
    }

    if (type === 'inventory') {
      const { inventory } = data;

      inventory.forEach((item, i) => {
        const slot = document.querySelector(`.inventory-slot[data-slot="${i}"]`);
        const icon = slot.querySelector('.slot-icon');
        const name = slot.querySelector('.slot-name');
        const quantity = slot.querySelector('.slot-quantity');

        icon.style.display = item ? 'block' : 'none';
        name.style.display = item ? 'block' : 'none';
        quantity.style.display = item ? 'block' : 'none';

        if (!item) {
          return;
        }

        icon.src = `${CDN_ASSETS_URL}/${item.iconImageUri}`;
        name.textContent = item.name;
        quantity.textContent = item.quantity !== -1 ? item.quantity : '∞';
      });
    }

    if (type === 'inventory-active-slot') {
      const { index } = data;

      // Remove active slot class from all slots
      document.querySelectorAll('.inventory-slot').forEach(slot => {
        slot.classList.remove('inventory-active-slot');
      });

      // Add active slot class to selected slot
      const activeSlot = document.querySelector(`.inventory-slot[data-slot="${index}"]`);
      if (activeSlot) {
        activeSlot.classList.add('inventory-active-slot');
      }
    }

    if (type === 'inventory-quantity-update') {
      const { index, quantity } = data;

      const slot = document.querySelector(`.inventory-slot[data-slot="${index}"]`);
      const quantityElement = slot.querySelector('.slot-quantity');

      quantityElement.textContent = quantity;
    }

    if (type === 'leaderboard-sync') {
      const { killCounts, localPlayer } = data;
      leaderboardKillCounts = killCounts;
      if (localPlayer) {
        localPlayerUsername = localPlayer;
      }
      updateLeaderboard();
    }

    if (type === 'leaderboard-update') {
      const { username, killCount, localPlayer } = data;
      leaderboardKillCounts[username] = killCount;
      if (localPlayer) {
        localPlayerUsername = localPlayer;
      }
      updateLeaderboard();
    }

    if (type === 'players-count') {
      const { count } = data;
      const playersCount = document.querySelector('.leaderboard-player-count-value');
      if (playersCount) {
        playersCount.textContent = count;
      }
    }

    if (type === 'materials') {
      const { materials } = data;
      const materialsAmount = document.querySelector('.materials-amount');
      const currentMaterials = parseInt(materialsAmount.textContent);
      const difference = materials - currentMaterials;

      if (difference !== 0) {
        const materialsCounter = document.querySelector('.materials-counter');
        const floatingNumber = document.createElement('div');
        floatingNumber.className = 'floating-number';
        floatingNumber.textContent = difference > 0 ? `+${difference}` : difference;
        materialsCounter.appendChild(floatingNumber);

        // Remove the element after animation completes
        setTimeout(() => {
          floatingNumber.remove();
        }, 1000);
      }

      materialsAmount.textContent = materials;
    }

    if (type === 'ranks') {
      ranks = data.ranks;
    }

    if (type === 'shield') {
      const { shield, maxShield } = data;
      const shieldText = document.querySelector('.shield-text');
      const shieldBarFill = document.querySelector('.shield-bar-fill');

      shieldText.textContent = shield;
      shieldBarFill.style.width = `${(shield / maxShield) * 100}%`;
    }

    if (type === 'scope-zoom') {
      const { zoom } = data;
      const scopeOverlay = document.querySelector('.scope-overlay');

      if (zoom === 1) {
        scopeOverlay.classList.remove('active');
      } else {
        scopeOverlay.classList.add('active');
      }
    }

    if (type === 'timer-sync') {
      const { startedAt, endsAt } = data;

      // Clear any existing timer interval
      if (timerInterval) {
        clearInterval(timerInterval);
      }

      // Set the end time
      gameEndTime = endsAt;

      // Update timer immediately
      updateTimer();

      // Set up interval to update timer every second
      timerInterval = setInterval(updateTimer, 1000);
    }
  });

  // Mobile UI Controls
  const inventorySlots = document.querySelectorAll('.inventory-slot');

  inventorySlots.forEach((slot, index) => {
    slot.addEventListener('click', () => {
      highchair.sendData({
        type: 'inventory-select',
        index: index,
      })
    });
  });

  const mobileReloadButton = document.getElementById('mobile-reload-button');
  mobileReloadButton.addEventListener('touchstart', () => {
    mobileReloadButton.classList.add('active');
    highchair.pressInput('r', true);
  });

  mobileReloadButton.addEventListener('touchend', () => {
    mobileReloadButton.classList.remove('active');
    highchair.pressInput('r', false);
  });

  const mobileJumpButton = document.getElementById('mobile-jump-button');
  mobileJumpButton.addEventListener('touchstart', () => {
    mobileJumpButton.classList.add('active');
    highchair.pressInput(' ', true);
  });

  mobileJumpButton.addEventListener('touchend', () => {
    mobileJumpButton.classList.remove('active');
    highchair.pressInput(' ', false);
  });

  const mobileAttackButton = document.getElementById('mobile-attack-button');
  mobileAttackButton.addEventListener('touchstart', () => {
    mobileAttackButton.classList.add('active');
    highchair.pressInput('ml', true);
  }, { passive: true });

  mobileAttackButton.addEventListener('touchend', () => {
    mobileAttackButton.classList.remove('active');
    highchair.pressInput('ml', false);
  }, { passive: true });

  const mobilePlaceBlockButton = document.getElementById('mobile-place-block-button');
  mobilePlaceBlockButton.addEventListener('touchstart', () => {
    mobilePlaceBlockButton.classList.add('active');

  });

  mobilePlaceBlockButton.addEventListener('touchend', () => {
    mobilePlaceBlockButton.classList.remove('active');
    highchair.pressInput('mr', false);
  });
</script>
