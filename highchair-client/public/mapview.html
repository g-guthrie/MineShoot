<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>biome-arena top-down</title>
  <style>
    body { background: #111; color: #ddd; font-family: monospace; margin: 20px; }
    canvas { image-rendering: pixelated; border: 1px solid #444; }
  </style>
</head>
<body>
  <div id="status">loading…</div>
  <canvas id="map" width="904" height="904"></canvas>
  <script>
    // Approximate top-face colors per block id (matches build-map.mjs registry).
    const COLORS = {
      1: '#9c5a4a', 2: '#b8a48a', 4: '#8a8a8a', 6: '#6fd8d8', 8: '#7a5230',
      9: '#3a2a4a', 10: '#5a4a6a', 11: '#2ecc71', 12: '#3a8a5a', 14: '#cfe8ef',
      15: '#c8a83a', 16: '#5fa83a', 17: '#9a9a8a', 18: '#bfe8f8', 19: '#b03a8a',
      20: '#5a3a6a', 21: '#b8a08a', 22: '#e85a1a', 23: '#6a4a2a', 24: '#6a8a5a',
      25: '#3a6a8a', 26: '#4a5a8a', 27: '#3a7a2a', 28: '#b8854a', 29: '#e8d8a8',
      30: '#dcc878', 31: '#e8d8a0', 32: '#d8b878', 33: '#4a4a52', 34: '#2a2a32',
      3: '#33333a', 35: '#f0f4f8', 36: '#7a7a82', 37: '#909098', 38: '#8a5adf', 39: '#caa8b8',
      40: '#8a4ab8', 41: '#3a2a3a', 43: '#3a6ad8',
      44: '#d8e8f0', 45: '#e0e8ea', 46: '#d0d8da', 47: '#c0ccd0', 48: '#a8d8e8',
      49: '#6a7a7a', 50: '#5a6a6a', 51: '#7a8a8a', 52: '#7a3a22', 53: '#8a4a2a',
      54: '#4a2a22', 56: '#7a8a4a', 57: '#5a7a3a', 58: '#8a8a5a', 59: '#5a4a28',
      60: '#6a5530', 61: '#4a3c22', 62: '#5a5a62', 63: '#4a4a52', 64: '#7a5a35',
      65: '#a8824a', 66: '#6a4f2e', 67: '#c8b890', 68: '#bfdfe8',
    };
    const mapName = new URLSearchParams(location.search).get('map') ?? 'mayhem-arena';
    fetch('http://127.0.0.1:8083/maps/' + mapName + '.json')
      .then(r => r.json())
      .then(map => {
        const top = new Map(); // "x,z" -> [y, id]
        for (const [key, id] of Object.entries(map.blocks)) {
          const [x, y, z] = key.split(',').map(Number);
          const k = x + ',' + z;
          const prev = top.get(k);
          if (!prev || y > prev[0]) top.set(k, [y, id]);
        }
        // boxman-imported types encode their color in the name: boxman-<hex>
        for (const t of map.blockTypes) {
          const m = /^boxman-([0-9a-f]{6})/.exec(t.name);
          if (m) COLORS[t.id] = '#' + m[1];
        }
        const ctx = document.getElementById('map').getContext('2d');
        const S = 6, R = 84;
        for (const [k, [y, id]] of top) {
          const [x, z] = k.split(',').map(Number);
          ctx.fillStyle = COLORS[id] ?? '#ff00ff';
          ctx.fillRect((x + R) * S, (z + R) * S, S, S);
          // height shading: higher is brighter
          ctx.fillStyle = y > 8 ? 'rgba(255,255,255,0.25)' : y > 4 ? 'rgba(255,255,255,0.12)' : 'rgba(0,0,0,' + Math.max(0, (3 - y) * 0.08) + ')';
          ctx.fillRect((x + R) * S, (z + R) * S, S, S);
        }
        document.getElementById('status').textContent =
          mapName + ' top-down (north = up, ' + top.size + ' columns)';
      })
      .catch(err => { document.getElementById('status').textContent = 'failed: ' + err; });
  </script>
</body>
</html>
