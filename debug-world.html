<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debug World Viewer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; }
canvas { display: block; }

#debug-toolbar {
    position: fixed;
    top: 12px;
    left: 12px;
    z-index: 10;
    background: rgba(20, 20, 30, 0.85);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 8px;
    padding: 10px 14px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    font-family: 'SF Mono', 'Consolas', monospace;
    font-size: 12px;
    color: #ccd;
    max-width: 600px;
}

#debug-toolbar label {
    display: flex;
    align-items: center;
    gap: 4px;
}

#debug-toolbar select {
    background: #2a2a3a;
    color: #eef;
    border: 1px solid #555;
    border-radius: 4px;
    padding: 3px 6px;
    font-family: inherit;
    font-size: 11px;
}

#debug-toolbar button {
    background: #2a2a3a;
    color: #aab;
    border: 1px solid #555;
    border-radius: 4px;
    padding: 4px 10px;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    transition: background 0.15s;
}
#debug-toolbar button:hover {
    background: #3a3a5a;
    color: #fff;
}

#coords-readout {
    color: #8f8;
    font-size: 11px;
    min-width: 160px;
}
</style>
</head>
<body>
<div id="debug-toolbar"></div>
<script type="module" src="js/debug/debug-world-bootstrap.js"></script>
</body>
</html>
