<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toon Character Lab</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="lab-shell">
      <section class="viewport" aria-label="Character animation preview">
        <canvas id="scene-canvas" tabindex="0"></canvas>
      </section>

      <aside class="controls" aria-label="Animation controls">
        <header>
          <p class="eyebrow">MineShoot Experiment</p>
          <div class="title-row">
            <h1>Toon Character Lab</h1>
            <button id="playtest-toggle" type="button">Control</button>
          </div>
        </header>

        <section class="control-group">
          <label>Character</label>
          <div id="character-buttons" class="segmented"></div>
        </section>

        <section class="control-group">
          <label for="clip-select">Animation</label>
          <select id="clip-select"></select>
        </section>

        <section class="control-group two-up">
          <button id="play-toggle" type="button">Pause</button>
          <button id="shot-pulse" type="button">Shot Pulse</button>
        </section>

        <section class="control-group">
          <label for="weapon-select">Weapon Node</label>
          <select id="weapon-select"></select>
        </section>

        <section class="control-group">
          <label for="speed-range">Playback Speed</label>
          <input id="speed-range" type="range" min="0.25" max="1.75" step="0.05" value="1" />
        </section>

        <section class="control-group">
          <label>Combat State</label>
          <div id="combat-state-buttons" class="segmented wide"></div>
        </section>

        <section class="control-group">
          <label>Camera Views</label>
          <div id="camera-buttons" class="segmented wide"></div>
        </section>

        <section class="control-group">
          <label>Mouse Aim</label>
          <div id="aim-controls" class="slider-stack"></div>
        </section>

        <section class="control-group">
          <label>Runtime Layers</label>
          <div id="layer-controls" class="slider-stack"></div>
        </section>

        <section class="control-group">
          <label>Pose Overlay</label>
          <div id="pose-controls" class="slider-stack"></div>
        </section>

        <section class="control-group">
          <label for="profile-json">Profile JSON</label>
          <textarea id="profile-json" spellcheck="false"></textarea>
          <div class="button-row">
            <button id="copy-profile" type="button">Copy JSON</button>
            <button id="apply-profile" type="button">Apply JSON</button>
            <button id="reset-pose" type="button">Reset Pose</button>
          </div>
        </section>

        <section class="control-group">
          <label>AI Capture</label>
          <div class="button-row">
            <button id="capture-current" type="button">Capture</button>
            <button id="capture-series" type="button">Series</button>
            <button id="capture-state-matrix" type="button">State Matrix</button>
            <button id="capture-asset-turnaround" type="button">Asset 4x</button>
            <button id="clear-captures" type="button">Clear</button>
          </div>
          <div id="capture-gallery" class="capture-gallery"></div>
        </section>

        <section class="control-group checks">
          <label>
            <input id="auto-rotate" type="checkbox" />
            Auto rotate
          </label>
          <label>
            <input id="show-skeleton" type="checkbox" />
            Skeleton
          </label>
          <label>
            <input id="show-aim" type="checkbox" checked />
            Aim target
          </label>
          <label>
            <input id="lock-weapon-target" type="checkbox" />
            Force aim weight
          </label>
        </section>

        <pre id="status" class="status">Loading...</pre>
      </aside>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
