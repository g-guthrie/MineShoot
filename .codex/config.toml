[features]
multi_agent = true

[agents]
max_threads = 10
max_depth = 2

[agents.quarterback]
description = "Primary orchestrator that enforces explorer-first fan-out, gated nested discovery, and strict writer ownership."
config_file = "agents/quarterback.toml"

[agents.explorer]
description = "Parallel context explorer that maps impacted files, dependencies, and unresolved unknowns."
config_file = "agents/explorer.toml"

[agents.reviewer]
description = "Read-only risk reviewer used as pre-edit and post-edit quality gate."
config_file = "agents/reviewer.toml"

[agents.balance_designer]
description = "Big-picture gameplay architect: validates practical player experience before implementation details."
config_file = "agents/balance-designer.toml"

[agents.worker]
description = "Integrator writer for cross-domain hot files and conflict resolution."
config_file = "agents/worker.toml"

[agents.worker_visual]
description = "Specialized writer for visual, UI, and animation files."
config_file = "agents/worker-visual.toml"

[agents.worker_authority]
description = "Specialized writer for authority, networking, and shared schema contracts."
config_file = "agents/worker-authority.toml"

[agents.worker_world]
description = "Specialized writer for world/runtime systems and frame-time stability."
config_file = "agents/worker-world.toml"

[agents.monitor]
description = "Monitoring-focused agent for long-running checks, polling, and status tracking."
config_file = "agents/monitor.toml"
