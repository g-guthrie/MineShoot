[features]
multi_agent = true

[agents]
max_threads = 6
max_depth = 2

[agents.explorer]
description = "Context-first investigator: aggressively gathers cross-file context before recommendations."
config_file = "agents/explorer.toml"

[agents.reviewer]
description = "First-principles simplifier: questions requirements, removes unnecessary complexity, and enforces concise correctness."
config_file = "agents/reviewer.toml"

[agents.balance_designer]
description = "Big-picture gameplay architect: validates practical player experience before implementation details."
config_file = "agents/balance-designer.toml"

[agents.worker]
description = "Implementation agent that merges context, big-picture intent, and simplification before coding."
config_file = "agents/worker.toml"

[agents.monitor]
description = "Monitoring-focused agent for long-running checks, polling, and status tracking."
config_file = "agents/monitor.toml"
