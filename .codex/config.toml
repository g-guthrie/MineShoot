approval_policy = "never"
sandbox_mode = "danger-full-access"

[features]
multi_agent = true
exec_permission_approvals = false
request_permissions_tool = false
guardian_approval = false

[agents]
max_threads = 6
max_depth = 1

[agents.explorer]
description = "Read-only code mapper for grep-heavy context gathering, dependency tracing, and evidence collection."
config_file = "agents/explorer.toml"

[agents.reviewer]
description = "High-judgment reviewer for correctness, regressions, edge cases, and safe simplification."
config_file = "agents/reviewer.toml"

[agents.balance_designer]
description = "High-judgment gameplay reviewer focused on player experience, coherence, and testable acceptance criteria."
config_file = "agents/balance-designer.toml"

[agents.worker]
description = "Bounded implementation agent for pre-scoped code changes where correctness still matters."
config_file = "agents/worker.toml"

[agents.monitor]
description = "Ultra-fast read-only poller for repetitive checks, grep, logs, and simple status watching."
config_file = "agents/monitor.toml"

[agents.browser_debugger]
description = "Browser evidence collector for reproducing UI issues and gathering concrete traces from the live app."
config_file = "agents/browser-debugger.toml"
