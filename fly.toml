# PeeVeePee — game server on Fly.io.
# Deploy: fly launch --copy-config --no-deploy && fly deploy
app = "peeveepee"
primary_region = "ord"

[build]
  dockerfile = "deploy/Dockerfile"

[env]
  PVP_BOT_COUNT = "0"

[http_service]
  internal_port = 8083
  force_https = true
  # A realtime game server must not scale to zero mid-match.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-2x"
  memory = "1gb"
